name: Efe Geometri Pro Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HTML Dosyasını Oluştur
        run: |
          mkdir -p www
          cat << 'EOF' > www/index.html
          <!DOCTYPE html>
          <html lang="tr">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>Efe Elite Geometri Hesaplayıcı</title>
              <style>
                  :root { --primary: #2563eb; --bg: #1e293b; --card: #ffffff; --text: #334155; }
                  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
                  .container { max-width: 600px; width: 100%; padding-bottom: 50px; }
                  .calc-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border-left: 6px solid var(--primary); }
                  h1 { color: #f8fafc; text-align: center; font-size: 1.8em; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
                  h2 { margin: 0 0 15px 0; font-size: 1.3em; color: var(--primary); display: flex; justify-content: space-between; }
                  .input-group { margin: 12px 0; display: flex; align-items: center; justify-content: space-between; font-weight: 500; }
                  input { padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; width: 100px; text-align: center; font-size: 1em; }
                  button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1em; transition: 0.3s; }
                  button:active { transform: scale(0.98); background: #1d4ed8; }
                  .result-box { margin-top: 15px; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.95em; line-height: 1.6; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📐 LGS Geometri Pro</h1>
                  <div class="calc-card">
                      <h2>1. Küp 🧊</h2>
                      <div class="input-group">Kenar (a): <input type="number" id="k_a" placeholder="cm"></div>
                      <button onclick="calcKup()">Hesapla</button>
                      <div id="res_kup" class="result-box">Değer giriniz...</div>
                  </div>
                  <div class="calc-card">
                      <h2>2. Dikdörtgen Prizma 📦</h2>
                      <div class="input-group">a: <input type="number" id="d_a"></div>
                      <div class="input-group">b: <input type="number" id="d_b"></div>
                      <div class="input-group">c: <input type="number" id="d_c"></div>
                      <button onclick="calcDik()">Hesapla</button>
                      <div id="res_dik" class="result-box">Değerleri giriniz...</div>
                  </div>
                  <div class="calc-card">
                      <h2>3. Kare Dik Prizma 📏</h2>
                      <div class="input-group">Taban (a): <input type="number" id="kp_a"></div>
                      <div class="input-group">Yükseklik (h): <input type="number" id="kp_h"></div>
                      <button onclick="calcKareP()">Hesapla</button>
                      <div id="res_kp" class="result-box">Değerleri giriniz...</div>
                  </div>
                  <div class="calc-card">
                      <h2>4. Üçgen Dik Prizma 🔺</h2>
                      <div class="input-group">a,b,c: <div style="display:flex; gap:2px;"><input type="number" id="u_a" style="width:40px;"><input type="number" id="u_b" style="width:40px;"><input type="number" id="u_c" style="width:40px;"></div></div>
                      <div class="input-group">hc: <input type="number" id="u_hc"></div>
                      <div class="input-group">h: <input type="number" id="u_h"></div>
                      <button onclick="calcUcgen()">Hesapla</button>
                      <div id="res_ucgen" class="result-box">Değerleri giriniz...</div>
                  </div>
                  <div class="calc-card">
                      <h2>5. Silindir 🔋</h2>
                      <div class="input-group">r: <input type="number" id="s_r"></div>
                      <div class="input-group">h: <input type="number" id="s_h"></div>
                      <button onclick="calcSilindir()">Hesapla</button>
                      <div id="res_sil" class="result-box">Değerleri giriniz...</div>
                  </div>
              </div>
              <script>
                  function calcKup() {
                      let a = parseFloat(document.getElementById('k_a').value);
                      if(!a) return;
                      document.getElementById('res_kup').innerHTML = `Çevre: ${12*a} | Alan: ${6*a*a} | Hacim: ${a**3}`;
                  }
                  function calcDik() {
                      let a = parseFloat(document.getElementById('d_a').value), b = parseFloat(document.getElementById('d_b').value), c = parseFloat(document.getElementById('d_c').value);
                      if(!a || !b || !c) return;
                      document.getElementById('res_dik').innerHTML = `Çevre: ${4*(a+b+c)} | Alan: ${2*(a*b+b*c+a*c)} | Hacim: ${a*b*c}`;
                  }
                  function calcKareP() {
                      let a = parseFloat(document.getElementById('kp_a').value), h = parseFloat(document.getElementById('kp_h').value);
                      if(!a || !h) return;
                      document.getElementById('res_kp').innerHTML = `Çevre: ${8*a+4*h} | Alan: ${2*a*a+4*a*h} | Hacim: ${a*a*h}`;
                  }
                  function calcUcgen() {
                      let a = parseFloat(document.getElementById('u_a').value), b = parseFloat(document.getElementById('u_b').value), c = parseFloat(document.getElementById('u_c').value), hc = parseFloat(document.getElementById('u_hc').value), h = parseFloat(document.getElementById('u_h').value);
                      if(!a || !b || !c || !hc || !h) return;
                      document.getElementById('res_ucgen').innerHTML = `Alan: ${(c*hc)+(h*(a+b+c))} | Hacim: ${((c*hc)/2)*h}`;
                  }
                  function calcSilindir() {
                      let r = parseFloat(document.getElementById('s_r').value), h = parseFloat(document.getElementById('s_h').value);
                      if(!r || !h) return;
                      document.getElementById('res_sil').innerHTML = `Alan: ${2*3*r*r+2*3*r*h} | Hacim: ${3*r*r*h}`;
                  }
              </script>
          </body>
          </html>
          EOF

      - name: Setup & Build
        run: |
          echo '{"name": "geo-efe", "version": "1.0.0", "dependencies": {"@capacitor/cli": "^5.0.0", "@capacitor/core": "^5.0.0", "@capacitor/android": "^5.0.0"}}' > package.json
          npm install
          npx cap init "Geometri Pro" "com.efe.geo" --web-dir www
          npx cap add android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Efe-Geometri-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
