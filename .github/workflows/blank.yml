name: Matematik Kitabi APK Motoru
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js ve Java 21 Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Hata buradaydı, 17'den 21'e yükselttik

      - name: Capacitor Altyapisini Kur
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "MatKitabim" "com.efe.matkitap" --web-dir www

      - name: Android Projesini Temizle ve Olustur
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android

      - name: APK Derle (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Matematik-Kitabim-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
