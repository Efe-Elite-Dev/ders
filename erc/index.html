<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efe'nin 100 Sayfalık LGS Kampı</title>
    <style>
        :root { --paper: #fdfbf7; --accent: #2563eb; --grid: #e5e7eb; --margin: #ef4444; }
        body { background-color: #1e293b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; perspective: 2000px; }
        .book { width: 550px; height: 750px; position: relative; transform-style: preserve-3d; }
        .page { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: var(--paper); border-radius: 5px 15px 15px 5px; box-shadow: inset 5px 0 15px rgba(0,0,0,0.1), 5px 5px 15px rgba(0,0,0,0.3); padding: 40px 40px 40px 60px; box-sizing: border-box; background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size: 25px 25px; transform-origin: left center; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1); backface-visibility: hidden; cursor: pointer; z-index: 1; display: none; }
        .page::before { content: ''; position: absolute; left: 45px; top: 0; bottom: 0; width: 2px; background: var(--margin); }
        .page.active { z-index: 10; display: block; }
        .page.flipped { transform: rotateY(-180deg); display: block; z-index: 5; }
        h1 { color: var(--accent); border-bottom: 3px solid var(--accent); font-size: 1.6em; }
        .content-box { background: rgba(255,255,255,0.9); border: 2px dashed #94a3b8; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        input { padding: 8px; border: 2px solid #cbd5e1; border-radius: 5px; width: 80px; text-align: center; font-weight: bold; }
        button { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        canvas { width: 250px; height: 250px; border: 2px solid #334155; margin: 10px auto; background: white; display: block; }
        .page-info { position: fixed; bottom: 20px; color: white; background: rgba(0,0,0,0.6); padding: 8px 25px; border-radius: 30px; }
        .formula { background: #fee2e2; color: #b91c1c; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-weight: bold;}
    </style>
</head>
<body>

    <div class="book" id="bookContainer"></div>
    <div class="page-info" id="pInfo">Sayfa: 1 / 100</div>

    <script>
        const book = document.getElementById('bookContainer');
        let currentIdx = 0;
        const totalPages = 100;
        let answers = {};

        for (let i = 1; i <= totalPages; i++) {
            const page = document.createElement('div');
            page.className = `page ${i === 1 ? 'active' : ''}`;
            page.onclick = function() { nextPage(this); };

            if (i === 1) {
                page.innerHTML = `<div style="text-align:center; margin-top:150px;">
                    <h1 style="border:none; font-size:3.5em;">LGS 2026</h1>
                    <h2 style="color:var(--accent)">100 SAYFALIK EĞİTİM SETİ</h2>
                    <p><b>Master:</b> Efe-Elite-Dev</p>
                    <p style="opacity:0.5; margin-top:100px;">Tıkla, Sayfaları Devir 👉</p>
                </div>`;
            } else if (i === 2) {
                page.innerHTML = `<h1>Örüntü Taktikleri (17/04 Notu)</h1>
                <div class="content-box">
                    <p><b>Soru:</b> 5, 8, 11, ... örüntüsü</p>
                    <p>Artış miktarı 3 olduğu için: <span class="formula">3n + 2</span></p>
                    <p><b>342. terim:</b> 3(342)+2 = <span class="formula">1028</span></p>
                    <hr>
                    <p><b>Soru:</b> 12, 19, 26, ... örüntüsü</p>
                    <p>Artış 7, formül: <span class="formula">7n + 5</span></p>
                    <p><b>236. terim:</b> 7(236)+5 = <span class="formula">1657</span></p>
                </div>`;
            } else if (i === 3) {
                page.innerHTML = `<h1>Doğru Grafiği: y = 2x + 4</h1>
                <div class="content-box" onclick="event.stopPropagation()">
                    <p>x=0 için y=4 | y=0 için x=-2</p>
                    <canvas id="cLine" width="250" height="250"></canvas>
                    <button onclick="drawL()">Grafiği Çiz</button>
                </div>`;
            } else if (i === 4) {
                page.innerHTML = `<h1>Geometri: Karekök ve Alan</h1>
                <div class="content-box">
                    <p>Bir kenarı <span class="formula">2√2</span> olan karenin alanı:</p>
                    <p>2√2 . 2√2 = 4 . 2 = <span class="formula">8 br²</span></p>
                    <hr>
                    <p>Hipotenüs Bulma (Pisagor):</p>
                    <p>a² + b² = c²</p>
                </div>`;
            } else {
                // Sayfa 5-100: SORU BANKASI
                page.innerHTML = `<h1>Sayfa ${i}: Soru Bankası</h1>
                <div class="content-box" onclick="event.stopPropagation()">
                    <div id="q_${i}" style="min-height:60px; font-weight:bold; color:var(--accent);">Yükleniyor...</div>
                    <input type="number" id="a_${i}">
                    <button onclick="checkQ(${i})">Onayla</button>
                    <p id="m_${i}"></p>
                </div>`;
            }
            book.appendChild(page);
        }

        function nextPage(elem) {
            if (currentIdx < totalPages - 1) {
                elem.classList.add('flipped'); elem.classList.remove('active');
                currentIdx++; document.querySelectorAll('.page')[currentIdx].classList.add('active');
            } else {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('flipped', 'active'));
                currentIdx = 0; document.querySelectorAll('.page')[0].classList.add('active');
            }
            document.getElementById('pInfo').innerText = `Sayfa: ${currentIdx + 1} / 100`;
        }

        function drawL() {
            const ctx = document.getElementById('cLine').getContext('2d');
            ctx.clearRect(0,0,250,250); ctx.beginPath(); ctx.moveTo(125,0); ctx.lineTo(125,250); ctx.moveTo(0,125); ctx.lineTo(250,125); ctx.stroke();
            ctx.strokeStyle="red"; ctx.lineWidth=3; ctx.beginPath();
            ctx.moveTo(125-50, 125-(2*-5+4)*10); ctx.lineTo(125+50, 125-(2*5+4)*10); ctx.stroke();
        }

        function genPool(id) {
            const pool = [
                {q: "y = 5x + 12 doğrusunun eğimi kaçtır?", a: 5},
                {q: "Kenarları 9 ve 12 olan üçgenin hipotenüsü?", a: 15},
                {q: "√196 kaçtır?", a: 14},
                {q: "2, 8, 14 örüntüsünün 10. terimi?", a: 56},
                {q: "Alanı 64 olan karenin çevresi kaçtır?", a: 32},
                {q: "y=2x+4 doğrusunun y eksenini kestiği nokta?", a: 4}
            ];
            let s = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById(`q_${id}`).innerText = s.q;
            answers[id] = s.a;
        }

        function checkQ(id) {
            let u = document.getElementById(`a_${id}`).value;
            document.getElementById(`m_${id}`).innerText = (u == answers[id]) ? "✅ Adamsın Efe!" : "❌ Tekrar Bak!";
        }

        window.onload = () => { for(let i=5; i<=100; i++) genPool(i); };
    </script>
</body>
</html>
